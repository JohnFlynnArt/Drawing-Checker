<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Art Studio - v0.4.0</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: system-ui, sans-serif; }
        #viewport { flex: 1; position: relative; overflow: hidden; touch-action: none; background: #121214; }
        .pan-wrapper { position: absolute; width: 100%; height: 100%; top:0; left:0; pointer-events: none; }
        .layer { 
            max-width: 90%; max-height: 90%; position: absolute; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); 
            display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .layer.loaded { display: block; }
        #control-dock { height: 210px; background: #1a1a1e; border-top: 1px solid #333; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .dock-row { display: flex; gap: 10px; }
        button { flex: 1; background: #333; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        button.active { background: #3b82f6; border-color: #60a5fa; }
        input[type="range"] { flex: 2; accent-color: #3b82f6; }
        .btn-slot { flex: 1; background: #2a2a2e; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="pan-wrapper" id="pan-wrapper">
            <img id="img-reference" class="layer" alt="Ref">
            <img id="img-drawing" class="layer" alt="Draw">
        </div>
    </div>
    
    <div id="control-dock">
        <div class="dock-row">
            <button class="btn-slot" onclick="document.getElementById('upload-ref').click()">Load Ref</button>
            <input type="file" id="upload-ref" accept="image/*" style="display:none;">
            <button class="btn-slot" onclick="document.getElementById('upload-draw').click()">Load Draw</button>
            <input type="file" id="upload-draw" accept="image/*" style="display:none;">
        </div>
        <div class="dock-row">
            <button id="engine-sightsize" class="active">Sight-Size</button>
            <button id="engine-2point">2-Point Match</button>
        </div>
        <div class="dock-row">
            <button id="target-ref-btn">Ref</button>
            <button id="target-draw-btn" class="active">Draw</button>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        const refImg = document.getElementById('img-reference');
        const drawingImg = document.getElementById('img-drawing');
        const viewport = document.getElementById('viewport');
        
        let activeTarget = 'draw';
        let layers = { 
            ref: { x: 0, y: 0, scale: 1, rot: 0, opacity: 1.0, el: refImg }, 
            draw: { x: 0, y: 0, scale: 1, rot: 0, opacity: 0.5, el: drawingImg } 
        };

        function updateTransforms() {
            Object.keys(layers).forEach(k => {
                let l = layers[k];
                l.el.style.transform = `translate(calc(-50% + ${l.x}px), calc(-50% + ${l.y}px)) rotate(${l.rot}deg) scale(${l.scale})`;
                l.el.style.opacity = l.opacity;
            });
        }

        // Multi-touch tracking
        let initialDist = 0, initialAngle = 0;

        viewport.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const l = layers[activeTarget];
            
            if (e.touches.length === 2) {
                // Pinch/Rotate Math
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const angle = Math.atan2(dy, dx) * 180 / Math.PI;

                if (initialDist) {
                    l.scale *= (dist / initialDist);
                    l.rot += (angle - initialAngle);
                }
                initialDist = dist;
                initialAngle = angle;
            } else if (e.touches.length === 1) {
                // Pan
                l.x += e.touches[0].clientX - (window.lastX || e.touches[0].clientX);
                l.y += e.touches[0].clientY - (window.lastY || e.touches[0].clientY);
                window.lastX = e.touches[0].clientX;
                window.lastY = e.touches[0].clientY;
            }
            updateTransforms();
        }, {passive: false});

        viewport.addEventListener('touchend', (e) => {
            initialDist = 0;
            window.lastX = null;
        });

        // Setup & UI
        function handleUpload(inputId, imgEl) {
            document.getElementById(inputId).addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    imgEl.onload = () => { imgEl.classList.add('loaded'); updateTransforms(); };
                    imgEl.src = URL.createObjectURL(file);
                }
            });
        }
        handleUpload('upload-ref', refImg);
        handleUpload('upload-draw', drawingImg);

        document.getElementById('target-ref-btn').addEventListener('click', () => { activeTarget = 'ref'; });
        document.getElementById('target-draw-btn').addEventListener('click', () => { activeTarget = 'draw'; });
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            layers[activeTarget].opacity = parseFloat(e.target.value);
            updateTransforms();
        });
    </script>
</body>
</html>
