<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Art Studio - v0.3</title>
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-family: system-ui, sans-serif; }
        #viewport { flex: 1; position: relative; overflow: hidden; touch-action: none; background: #121214; }
        .pan-wrapper { position: absolute; width: 100%; height: 100%; transform-origin: center center; pointer-events: none; }
        .layer { max-width: 90%; max-height: 90%; position: absolute; top: 50%; left: 50%; display: none; transition: opacity 0.1s; }
        .layer.loaded { display: block; }
        #control-dock { height: 210px; background: #1a1a1e; border-top: 1px solid #333; display: flex; flex-direction: column; padding: 10px; gap: 10px; }
        .dock-row { display: flex; gap: 10px; }
        button { flex: 1; background: #333; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
        button.active { background: #3b82f6; border-color: #60a5fa; }
        input[type="range"] { flex: 2; accent-color: #3b82f6; }
        .file-slot { flex: 1; border: 1px dashed #444; color: #9ba1a6; padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .file-slot.ready { border-style: solid; border-color: #10b981; color: #10b981; }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="pan-wrapper" id="pan-wrapper">
            <img id="img-reference" class="layer" alt="Ref">
            <img id="img-drawing" class="layer" alt="Draw">
        </div>
    </div>
    
    <div id="control-dock">
        <div class="dock-row">
            <label class="file-slot" id="slot-ref"><span>Load Ref</span><input type="file" id="upload-ref" accept="image/*" hidden></label>
            <label class="file-slot" id="slot-draw"><span>Load Draw</span><input type="file" id="upload-draw" accept="image/*" hidden></label>
        </div>
        <div class="dock-row">
            <button id="engine-sightsize" class="active">Sight-Size</button>
            <button id="engine-2point">2-Point Match</button>
        </div>
        <div class="dock-row">
            <button id="target-ref-btn">Ref</button>
            <button id="target-draw-btn" class="active">Draw</button>
            <input type="range" id="opacity-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        const refImg = document.getElementById('img-reference');
        const drawingImg = document.getElementById('img-drawing');
        const panWrapper = document.getElementById('pan-wrapper');
        const viewport = document.getElementById('viewport');
        
        let zoomScale = 1, panX = 0, panY = 0, activeTarget = 'draw';
        let layers = { 
            ref: { x: 0, y: 0, scale: 1, rot: 0, opacity: 1.0, el: refImg }, 
            draw: { x: 0, y: 0, scale: 1, rot: 0, opacity: 0.5, el: drawingImg } 
        };

        function updateTransforms() {
            panWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomScale})`;
            Object.keys(layers).forEach(k => {
                let l = layers[k];
                l.el.style.transform = `translate(-50%, -50%) translate(${l.x}px, ${l.y}px) rotate(${l.rot}deg) scale(${l.scale})`;
                l.el.style.opacity = l.opacity;
            });
        }

        // Gesture Logic
        let isPanning = false;
        let lastX, lastY;

        viewport.addEventListener('touchstart', (e) => {
            isPanning = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        });

        viewport.addEventListener('touchmove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            let dx = e.touches[0].clientX - lastX;
            let dy = e.touches[0].clientY - lastY;
            
            // Apply movement to the Active Layer
            layers[activeTarget].x += dx;
            layers[activeTarget].y += dy;
            
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
            updateTransforms();
        }, {passive: false});

        viewport.addEventListener('touchend', () => isPanning = false);

        // Standard setup for loaders/UI...
        function setupFileLoader(slotId, inputId, imgEl) {
            const slot = document.getElementById(slotId), input = document.getElementById(inputId);
            slot.addEventListener('click', () => input.click());
            input.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    imgEl.onload = () => { imgEl.classList.add('loaded'); updateTransforms(); };
                    imgEl.src = URL.createObjectURL(e.target.files[0]);
                    slot.classList.add('ready');
                    slot.querySelector('span').textContent = "Loaded";
                }
            });
        }
        setupFileLoader('slot-ref', 'upload-ref', refImg);
        setupFileLoader('slot-draw', 'upload-draw', drawingImg);

        document.getElementById('target-ref-btn').addEventListener('click', () => { 
            activeTarget = 'ref'; 
            document.getElementById('target-ref-btn').classList.add('active');
            document.getElementById('target-draw-btn').classList.remove('active');
        });
        document.getElementById('target-draw-btn').addEventListener('click', () => { 
            activeTarget = 'draw'; 
            document.getElementById('target-draw-btn').classList.add('active');
            document.getElementById('target-ref-btn').classList.remove('active');
        });
        document.getElementById('opacity-slider').addEventListener('input', (e) => {
            layers[activeTarget].opacity = parseFloat(e.target.value);
            updateTransforms();
        });
    </script>
</body>
</html>
